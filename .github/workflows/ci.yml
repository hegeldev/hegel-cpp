name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y just clang-tidy-18

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
      - name: Check formatting
        run: |
          just format
          git diff --exit-code

      - name: Install zizmor
        run: pip install zizmor
      - name: Run zizmor
        run: zizmor --format plain .github/

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install hegel
        run: pip install hegel-core

      - name: Run clang-tidy
        run: just check-tidy

  build-and-test:
    name: ${{ matrix.compiler }} ${{ matrix.stdlib && format('(with {0})', matrix.stdlib) || '' }} ${{ matrix.extra_label || '' }}
    runs-on: ${{ matrix.os || 'ubuntu-24.04' }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: g++-13
            cc: gcc-13
            cxx: g++-13

          - compiler: g++-11
            cc: gcc-11
            cxx: g++-11
            packages: g++-11

          - compiler: clang++-18
            cc: clang-18
            cxx: clang++-18
            packages: clang-18

          - compiler: clang++-18
            cc: clang-18
            cxx: clang++-18
            stdlib: libc++
            packages: clang-18 libc++-18-dev libc++abi-18-dev
            cmake_flags: -DCMAKE_CXX_FLAGS="-stdlib=libc++"

          - compiler: g++-13
            cc: gcc-13
            cxx: g++-13
            extra_label: (nlohmann 3.11)
            cmake_flags: -DNLOHMANN_JSON_VERSION=3.10.0

          - compiler: macos
            cc: cc
            cxx: c++
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install compiler
        if: matrix.packages
        env:
          PACKAGES: ${{ matrix.packages }}
        run: |
          sudo apt-get update
          sudo apt-get install -y $PACKAGES

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install hegel
        run: pip install hegel-core

      - name: Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          CMAKE_FLAGS: ${{ matrix.cmake_flags }}
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            $CMAKE_FLAGS

      - name: Build
        run: |
          # nproc on linux, sysctl on macos
          JOBS=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
          cmake --build build -j$JOBS

      - name: Run property tests
        run: ctest --test-dir build/tests --output-on-failure -j$(nproc)

  conformance:
    name: conformance
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install hegel
        run: pip install hegel-core==0.4.0

      - name: Configure CMake
        run: cmake -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run conformance tests
        timeout-minutes: 10
        run: |
          pip install pytest
          pytest tests/conformance/test_conformance.py -v

  nix:
    name: nix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}
      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b # v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: lint
        run: nix run nixpkgs#nixfmt -- --check nix/flake.nix
      - name: test
        working-directory: tests/nix
        run: |
          nix-build . 2>&1 | tee build.log
          result/bin/nix_test >> build.log
          grep "test_nix_integration_canary" build.log
          grep "All nix integration tests passed!" build.log

  docs:
    name: docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install hegel
        run: pip install hegel-core

      - name: Configure CMake
        run: cmake -B build -DHEGEL_BUILD_DOCS=ON

      - name: Build docs
        run: cmake --build build --target docs

  release:
    name: release
    if: github.event_name == 'push' && github.repository == 'hegeldev/hegel-cpp'
    needs: [lint, build-and-test, conformance, docs]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check for RELEASE.md
        id: check
        run: |
          if [ ! -f RELEASE.md ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate app token
        if: steps.check.outputs.skip != 'true'
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        id: app-token
        with:
          app-id: ${{ vars.HEGEL_RELEASE_APP_ID }}
          private-key: ${{ secrets.HEGEL_RELEASE_APP_PRIVATE_KEY }}
          repositories: hegel-cpp

      - name: Re-checkout with app token # zizmor: ignore[artipacked]
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEGEL_RELEASE_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: python .github/scripts/release.py release

      - name: Push to main or open PR
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python .github/scripts/release.py push-or-pr
