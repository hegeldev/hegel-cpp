name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress PR builds if another commit is pushed.
# On non-PR builds, fall back to the globally-unique run_id and don't cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check-release:
    name: check release
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check release
        run: python .github/scripts/release.py check "${{ github.base_ref }}"

  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y just
      - uses: astral-sh/setup-uv@v6
      - name: format
        run: |
          just format
          git diff --exit-code

  build-and-test:
    name: ${{ matrix.compiler }} ${{ matrix.stdlib && format('(with {0})', matrix.stdlib) || '' }} ${{ matrix.extra_label || '' }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          # GCC 13 (with libstdc++)
          - compiler: g++-13
            cc: gcc-13
            cxx: g++-13

          # GCC 11 (with libstdc++)
          - compiler: g++-11
            cc: gcc-11
            cxx: g++-11
            packages: g++-11

          # Clang (with libstdc++)
          - compiler: clang++-18
            cc: clang-18
            cxx: clang++-18
            packages: clang-18

          # Clang (with libc++)
          - compiler: clang++-18
            cc: clang-18
            cxx: clang++-18
            stdlib: libc++
            packages: clang-18 libc++-18-dev libc++abi-18-dev
            cmake_flags: -DCMAKE_CXX_FLAGS="-stdlib=libc++"

          # GCC 13 (with libstdc++) (with oldest nlohmann/json we support)
          - compiler: g++-13
            cc: gcc-13
            cxx: g++-13
            extra_label: (nlohmann 3.11)
            cmake_flags: -DNLOHMANN_JSON_VERSION=3.10.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install compiler
        if: matrix.packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install hegel
        run: |
          pip install git+ssh://git@github.com/antithesishq/hegel.git

      - name: Configure CMake
        run: |
          cmake -B build \
            -DHEGEL_BUILD_DOCS=OFF \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run property tests
        run: ctest --test-dir build --output-on-failure

  conformance:
    name: conformance
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install hegel
        run: |
          pip install git+ssh://git@github.com/antithesishq/hegel.git

      - name: Configure CMake
        run: cmake -B build -DHEGEL_BUILD_DOCS=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run conformance tests
        timeout-minutes: 10
        working-directory: tests/conformance
        run: |
          pip install pytest
          pytest test_conformance.py -v

  nix:
    name: nix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: lint
        run: nix run nixpkgs#nixfmt -- --check flake.nix
      - name: test
        working-directory: tests/nix
        run: |
          nix-build . 2>&1 | tee build.log
          result/bin/nix_test >> build.log
          # canary string to ensure we're actually building what we think we are.
          grep "test_nix_integration_canary" build.log
          grep "All nix integration tests passed!" build.log

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install hegel
        run: pip install git+ssh://git@github.com/antithesishq/hegel.git

      - name: Configure CMake
        run: cmake -B build -DHEGEL_BUILD_DOCS=ON

      - name: Build docs
        run: cmake --build build --target docs

  release:
    name: release
    if: github.event_name == 'push' && github.repository == 'antithesishq/hegel-cpp'
    needs: [format, build-and-test, conformance, nix, docs]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for RELEASE.md
        id: check
        run: |
          if [ ! -f RELEASE.md ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate app token
        if: steps.check.outputs.skip != 'true'
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.HEGEL_RELEASE_APP_ID }}
          private-key: ${{ secrets.HEGEL_RELEASE_APP_PRIVATE_KEY }}

      - name: Re-checkout with app token
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python .github/scripts/release.py release
