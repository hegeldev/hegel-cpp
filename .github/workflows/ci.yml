name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update && sudo apt-get install -y just

          # all else equal, we'd prefer to get this from apt-get. But the version ubuntu
          # carries is pretty old; this lets us install the latest.
          pip install clang-format
      - name: format
        run: |
          just format
          git diff --exit-code

  build-and-test:
    name: ${{ matrix.compiler }} ${{ matrix.stdlib && format('(with {0})', matrix.stdlib) || '' }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          # GCC 13 (with libstdc++)
          - compiler: g++-13
            cc: gcc-13
            cxx: g++-13

          # GCC 11 (with libstdc++)
          - compiler: g++-11
            cc: gcc-11
            cxx: g++-11
            packages: g++-11

          # Clang (with libstdc++)
          - compiler: clang++-18
            cc: clang-18
            cxx: clang++-18
            packages: clang-18

          # Clang (with libc++)
          - compiler: clang++-18
            cc: clang-18
            cxx: clang++-18
            stdlib: libc++
            packages: clang-18 libc++-18-dev libc++abi-18-dev
            cmake_flags: -DCMAKE_CXX_FLAGS="-stdlib=libc++"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install compiler
        if: matrix.packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install hegel
        run: |
          pip install git+ssh://git@github.com/antithesishq/hegel.git

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run property tests
        run: ctest --test-dir build --output-on-failure

      # TODO: Re-enable once the C++ SDK implements the binary CBOR protocol
      # that the current hegel server expects. The SDK still uses the legacy
      # JSON-over-newline protocol, causing these tests to hang indefinitely.
      # - name: Run conformance tests
      #   working-directory: tests/conformance
      #   timeout-minutes: 10
      #   run: |
      #     pip install pytest
      #     pytest test_conformance.py -v

  nix:
    name: nix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}
      - uses: cachix/install-nix-action@v27
      - name: lint
        run: nix run nixpkgs#nixfmt -- --check flake.nix tests/nix/flake.nix
      - name: test
        working-directory: tests/nix
        run: |
          # deleting the lock file allows nix to resolve the `path:../..` input value
          # without erroring about unlocked values / irreproducible builds
          rm -f flake.lock
          nix build -L 2>&1 | tee build.log
          # canary string to ensure we're actually building what we think we are.
          grep "test_nix_integration_canary" build.log

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install hegel
        run: pip install git+ssh://git@github.com/antithesishq/hegel.git

      - name: Configure CMake
        run: cmake -B build -DHEGEL_BUILD_DOCS=ON

      - name: Build docs
        run: cmake --build build --target docs
