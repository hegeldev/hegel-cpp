name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} ${{ matrix.stdlib && format('(with {0})', matrix.stdlib) || '' }} ${{ matrix.extra_label || '' }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          # GCC 13 (with libstdc++)
          - compiler: g++-13
            cc: gcc-13
            cxx: g++-13

          # GCC 11 (with libstdc++)
          - compiler: g++-11
            cc: gcc-11
            cxx: g++-11
            packages: g++-11

          # Clang (with libstdc++)
          - compiler: clang++-18
            cc: clang-18
            cxx: clang++-18
            packages: clang-18

          # Clang (with libc++)
          - compiler: clang++-18
            cc: clang-18
            cxx: clang++-18
            stdlib: libc++
            packages: clang-18 libc++-18-dev libc++abi-18-dev
            cmake_flags: -DCMAKE_CXX_FLAGS="-stdlib=libc++"

          # GCC 13 (with libstdc++) (with oldest nlohmann/json we support)
          - compiler: g++-13
            cc: gcc-13
            cxx: g++-13
            extra_label: (nlohmann 3.11)
            cmake_flags: -DNLOHMANN_JSON_VERSION=3.10.0

    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install compiler
        if: matrix.packages
        env:
          PACKAGES: ${{ matrix.packages }}
        run: |
          sudo apt-get update
          sudo apt-get install -y $PACKAGES

      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}

      - name: Install just
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install hegel
        run: just setup

      - name: Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          CMAKE_FLAGS: ${{ matrix.cmake_flags }}
        run: |
          cmake -B build \
            -DHEGEL_BUILD_DOCS=OFF \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            $CMAKE_FLAGS

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run property tests
        run: ctest --test-dir build --output-on-failure
