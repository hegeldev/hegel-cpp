name: Nix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  nix:
    name: nix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/base
        with:
          ssh-key: ${{ secrets.HEGEL_DEPLOY_KEY }}
      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b # v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: lint
        run: nix run nixpkgs#nixfmt -- --check flake.nix
      - name: test
        working-directory: tests/nix
        run: |
          nix-build . 2>&1 | tee build.log
          result/bin/nix_test >> build.log
          # canary string to ensure we're actually building what we think we are.
          grep "test_nix_integration_canary" build.log
          grep "All nix integration tests passed!" build.log
